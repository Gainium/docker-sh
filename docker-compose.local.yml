# Local-development override.
#
# Purpose: when you're running the application services (app-sh,
# exchange-connector-sh, paper-trading-sh, websocket-connector-sh,
# main-dash-sh) natively on the host instead of inside docker, those
# host-side processes need to reach Mongo / Redis / RabbitMQ on
# `localhost:<port>`. The base `docker-compose.yml` keeps the infra
# services on the internal `default` network with no published ports
# — fine for production (smaller attack surface), wrong for local dev.
#
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml \
#                  up -d mongo redis rabbit
#
# Or set `COMPOSE_FILE=docker-compose.yml:docker-compose.local.yml` in
# your shell once. Production users should not invoke this file.
#
# NEVER use this in production — it exposes datastore ports to anyone
# who can reach the host.

services:
  mongo:
    ports:
      - "${MONGO_DB_PORT:-27017}:${MONGO_DB_PORT:-27017}"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  rabbit:
    ports:
      - "${RABBIT_PORT:-5672}:5672"
      # Management UI — handy for inspecting queues during dev.
      - "15672:15672"
