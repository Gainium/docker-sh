        condition: service_healthy
      api:
        condition: service_healthy  # Ensure the image is built first
    volumes:
      - 'backtest-candles:/app/loaded-data-candles'
      - 'backtest-files:/app/user-files'

  # Price connector uses the same websocket-connector image
  price-connector:
    image: docker.gainium.io/gainium/websocket-connector:${WEBSOCKET_CONNECTOR_VERSION:-1.13.1}
    restart: 'unless-stopped'
    hostname: price-connector
    command: ["npm", "run", "price"]  # Override the default command
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - RABBIT_HOST=${RABBIT_HOST}
      - RABBIT_USER=${RABBIT_USER}
      - RABBIT_PASSWORD=${RABBIT_PASSWORD}
      - EXCHANGE_SERVICE_API_URL=${EXCHANGE_SERVICE_API_URL}
      - COINBASE_API_KEY=${COINBASEKEY}
      - COINBASE_API_SECRET=${COINBASESECRET}
      # Self-hosted runs a SINGLE price connector, so it must run the "all"
      # role: it produces BOTH the candle streams (charts/indicators) AND the
      # `trade@{sym}@{exchange}` ticker feed that paper-trading fills orders
      # from. Hardcoded (not ${PRICEROLE}) so existing installs whose .env
      # still says `candle` are fixed on the next `up` — a candle-only feed
      # silently starves paper/live fills (esp. ticker-only exchanges like
      # Coinbase, which have no candle producer). Split roles only if you add
      # a second connector for scale.
      - PRICEROLE=all
      - PRICE_CONNECTOR_EXCHANGES=${PRICE_CONNECTOR_EXCHANGES}
      - ADMIN_CONFIG_ENABLED=${ADMIN_CONFIG_ENABLED:-true}
      - NODE_ENV=production
      - npm_config_loglevel=silent
      - npm_config_update_notifier=false
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
      exchange-connector:
        condition: service_healthy
      user-update-connector:
        condition: service_healthy  # Ensure the image is built first

  # Utility service for running one-off CLI commands (password reset, etc)
  # Usage: docker-compose run --rm cli-runner npm run cli:reset-password -- <username> <newPassword>
  cli-runner:
    image: docker.gainium.io/gainium/main-app:${MAIN_APP_VERSION:-1.35.5}
    environment:
      - MONGO_DB_USERNAME=${MONGO_DB_USERNAME}
      - MONGO_DB_PASSWORD=${MONGO_DB_PASSWORD}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - MONGO_DB_PORT=${MONGO_DB_PORT}
      - MONGO_DB_HOST=${MONGO_DB_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy

  # Frontend — v2 Vite SPA served by nginx (no Node runtime in the image).
  # The image's default CMD launches nginx; no `command:` override needed.
  # `PORT` is templated into nginx.conf at container start (defaults to 7555
  # inside the image, overridden here via env).
  frontend:
    image: docker.gainium.io/gainium/frontend:${FRONTEND_VERSION:-2.33.18}
    restart: 'unless-stopped'
    hostname: frontend
    ports:
      - ${PORT}:${PORT}
    environment:
      - PORT=${PORT}
      - VITE_API_ENDPOINT=${VITE_API_ENDPOINT:-http://localhost:${GRAPH_QL_PORT}}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:${WS_PORT}}
      # Admin API URL the dashboard reaches for the /admin page. Sh-only
      # — cloud builds leave it unset and the page renders a "not
      # configured" state.
      - VITE_ADMIN_API_URL=${VITE_ADMIN_API_URL:-http://localhost:${ADMIN_PORT:-7507}}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${PORT}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy

  # =============================================================================
  # ADMIN SERVICE
  # =============================================================================

  # Self-hosted admin API powering the dashboard's /admin page. Manages
  # compose-service lifecycle (start/stop/restart/logs), the operator's
  # enabled-exchange set (synced to connectors via Redis pubsub), and
  # image upgrades. Cloud deployments never run this service.
  #
  # admin-sh mounts /var/run/docker.sock so it can talk to the host
  # daemon for container actions + image pulls. It only ever touches
  # containers labelled with COMPOSE_PROJECT_NAME (set below) — the
  # compose-project label scopes it to the gainium-sh stack.
  #
  # COMPOSE_DIR_HOST_PATH is the HOST absolute path of this docker-sh
  # checkout. Required only for the self-upgrade flow (admin-sh spawns
  # a one-shot `docker:27-cli` helper that mounts this path and runs
  # `docker compose up -d admin-sh`). Leave blank to disable self-
  # upgrade — the admin UI then returns a clear, actionable error
  # instead of silently staying on the old image. In that case (or if a
  # self-upgrade fails) upgrade admin-sh by hand from this dir:
  #   docker compose pull admin-sh && docker compose up -d --force-recreate admin-sh
  admin-sh:
    image: docker.gainium.io/gainium/admin-sh:${ADMIN_SH_VERSION:-1.3.1}
    restart: 'unless-stopped'
    hostname: admin-sh
    # Run as root inside the container so we can read /var/run/docker
    # .sock without juggling host docker-group gids (they differ per
    # OS — 999 on most Linux, varies on macOS Desktop). admin-sh
    # already mounts the docker socket, which is root-on-host
    # equivalent — running its node process as in-container root
    # doesn't change the real privilege envelope.
    user: "0:0"
    ports:
      - "${ADMIN_PORT:-7507}:${ADMIN_PORT:-7507}"
    environment:
      - PORT=${ADMIN_PORT:-7507}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-gainium-app}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - PRICE_CONNECTOR_EXCHANGES=${PRICE_CONNECTOR_EXCHANGES}
      - DOCKER_REGISTRY_HOST=${DOCKER_REGISTRY_HOST:-docker.gainium.io}
      - DOCKER_REGISTRY_USER=${DOCKER_REGISTRY_USER}
      - DOCKER_REGISTRY_PASS=${DOCKER_REGISTRY_PASS}
      - COMPOSE_DIR_HOST_PATH=${COMPOSE_DIR_HOST_PATH}
      - UPGRADE_HELPER_IMAGE=${UPGRADE_HELPER_IMAGE:-docker:27-cli}
      # Lives inside the project-dir bind mount above — admin-sh
      # creates the file the first time an upgrade writes to it.
      - VERSIONS_ENV_PATH=/workspace/.versions.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind mount of the docker-sh project directory. Two reasons:
      #   1. admin-sh creates .versions.env inside this dir on first
      #      upgrade — Docker can't auto-create a single-file bind-
      #      mount target as a file (it'd create a directory), so we
      #      bind the parent dir instead. No `touch` step needed.
      #   2. Lets admin-sh read .env / docker-compose.yml if it ever
      #      needs to (currently it doesn't, but the access is here).
      # Trust model: admin-sh already mounts /var/run/docker.sock
      # (root-on-host equivalent), so additional rw access to this
      # directory is a small marginal exposure.
      - .:/workspace
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${ADMIN_PORT:-7507}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

networks:
  default:
    driver: bridge
volumes:
  mongo:
    driver: local
  redis:
    driver: local
  rabbitmq:
    driver: local
  backtest-candles:
    driver: local
  backtest-files:
    driver: local
